    <!-- Fixed BG: Tsubasa Stadium -->
    <div class="bg-fixed">
        <img src="assets/FondoTsubasa.jpeg" alt="" class="bg-img">
        <div class="bg-overlay"></div>
    </div>

    <div class="app myclub-app">
        <!-- TEXT NAV -->
        <nav class="top-text-nav">
            <a href="index.html">HOME</a>
            <a href="packs.html">PACKS</a>
            <a href="myclub.html" class="active">MY CLUB</a>
        </nav>

        <main class="content myclub-content">
            <!-- FILTERS BAR -->
            <div class="filters-bar">
                <input type="text" id="filter-search" class="filter-input" placeholder="Buscar jugador...">
                


                <select id="filter-league" class="filter-select">
                    <option value="all">Todas las Ligas</option>
                </select>
                <!-- Custom Dropdown for Teams to support images -->
                <div class="custom-select-wrapper filter-select" id="custom-team-wrapper" style="padding:0; border:none; background:transparent;">
                    <div class="custom-select-trigger" id="custom-team-trigger">
                        <span id="custom-team-label">Todos los Equipos</span>
                    </div>
                    <div class="custom-options" id="custom-team-options">
                        <div class="custom-option" data-value="all">Todos los Equipos</div>
                        <!-- Options injected by JS -->
                    </div>
                    <input type="hidden" id="filter-team" value="all">
                </div>

                <!-- Custom Dropdown for Nationality to support images -->
                <div class="custom-select-wrapper filter-select" id="custom-nation-wrapper" style="padding:0; border:none; background:transparent;">
                    <div class="custom-select-trigger" id="custom-nation-trigger">
                        <span id="custom-nation-label">País</span>
                    </div>
                    <div class="custom-options" id="custom-nation-options">
                        <div class="custom-option" data-value="">Cualquier País</div>
                        <!-- Options injected by JS -->
                    </div>
                    <input type="hidden" id="filter-nation" value="all">
                </div>

                <select id="sort-cards" class="filter-select">
                    <option value="rating-desc">Media: Mayor a Menor</option>
                    <option value="rating-asc">Media: Menor a Mayor</option>
                    <option value="name-asc">Nombre: A - Z</option>
                    <option value="name-desc">Nombre: Z - A</option>
                </select>
            </div>

            <!-- GRID -->
            <div id="myclub-grid" class="myclub-grid">
                <!-- Cards injected here via JS -->
            </div>

            <!-- PAGINATION -->
            <div class="modal-pagination" id="myclub-pagination" style="display: flex; justify-content: center; gap: 15px; margin-top: 0px; margin-bottom: 10px; align-items: center;">
                <button id="myclub-prev" class="page-btn" style="background:rgba(255,255,255,0.05); border:1px solid rgba(17, 181, 201, 0.4); color:#fff; font-family:var(--font-b); font-size:1rem; padding:6px 14px; border-radius:8px; cursor:pointer; transition:0.3s; min-width: 100px;">◀ ANTERIOR</button>
                <span id="myclub-page-info" style="color: white; font-family: var(--font-b); font-size: 1.2rem;">PÁG 1 DE 1</span>
                <button id="myclub-next" class="page-btn" style="background:rgba(255,255,255,0.05); border:1px solid rgba(17, 181, 201, 0.4); color:#fff; font-family:var(--font-b); font-size:1rem; padding:6px 14px; border-radius:8px; cursor:pointer; transition:0.3s; min-width: 100px;">SIGUIENTE ▶</button>
            </div>
        </main>
    </div>

    <!-- Zoom Modal -->
    <div id="card-zoom-modal" class="hidden">
        <div id="card-zoom-content"></div>
        <div class="tap-to-close">Tap anywhere to close</div>
    </div>
