<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Anime Strikers - Crea tu equipo definitivo con el Squad Builder.">
    <title>ANIME STRIKERS ⚽ - Squad Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=172">
    <link rel="stylesheet" href="squad.css?v=172">
</head>
<body>

    <!-- Fixed BG -->
    <div class="bg-fixed">
        <img src="assets/FondoInazuma.png" alt="" class="bg-img">
        <div class="bg-overlay"></div>
    </div>

    
    

    <div class="app new-layout">
        
        <!-- LEFT SIDEBAR -->
        <div class="left-sidebar">
            
            <!-- Squad Selector -->
            <div class="sidebar-box squad-selector-box">
                <button class="squad-arrow" id="squad-left">◀</button>
                <input type="text" id="squad-name-input" class="squad-name-input" value="Squad 1" maxlength="15">
                <button class="squad-arrow" id="squad-right">▶</button>
            </div>

            <!-- Coach Slot -->
            <div class="coach-container">
                <div class="box-label">ENTRENADOR</div>
                <div class="player-slot" id="coach-slot" onclick="openPlayerModal(null, 'coach')" style="position:relative; transform:scale(0.85); transform-origin: top center; left:auto; top:auto; margin: 0 auto; width: 150px; height: 210px;">
                    <!-- Placeholder graphic -->
                </div>
            </div>

            <!-- Chemistry / Rating -->
            <div class="sidebar-box tactiques-box">
                <div class="box-label">TÁCTICAS</div>
                <div class="rating-info">
                    <span class="info-label">VALORACIÓN</span>
                    <span id="rating-stars" class="stars">★★★★★</span>
                    <span id="rating-num" class="num">0</span>
                </div>
                <div class="chem-info">
                    <span class="info-label">QUÍMICA</span>
                    <div class="chem-bar">
                        <div class="chem-fill" id="chem-fill" style="width:0%"></div>
                    </div>
                    <span id="chem-num" class="num">0</span>
                </div>
            </div>

            <!-- Formation -->
            <div class="sidebar-box formation-box">
                <div class="box-label">FORMACIÓN</div>
                <div class="formation-selector-new">
                    <button class="form-arrow" id="form-left">◀</button>
                    <span class="form-name" id="form-name-display">4-3-3</span>
                    <button class="form-arrow" id="form-right">▶</button>
                </div>
            </div>

            <!-- Kit & Crest -->
            <div class="bottom-boxes">
                <div class="sidebar-box badge-box">
                    <div class="box-label">ESCUDO</div>
                    <div class="badge-icon" id="badge-icon" style="background-size:contain; background-repeat:no-repeat; background-position:center;"></div>
                </div>
                <div class="sidebar-box kit-box" onclick="openKitModal()" style="cursor: pointer;">
                    <div class="box-label">EQUIPACIÓN</div>
                    <div class="kit-icon" id="kit-icon" style="background-size:contain; background-repeat:no-repeat; background-position:center;"></div>
                </div>
            </div>

            <!-- Clear button -->
            <button class="squad-btn clear-btn" id="clear-squad">🗑️ LIMPIAR</button>
        </div>

        <!-- CENTER PITCH -->
        <div class="center-pitch">
            <div class="pitch-container">
                <div class="pitch" id="pitch">
                    <!-- Pitch markings -->
                    <div class="pitch-markings">
                        <div class="pitch-center-dot"></div>
                        <div class="pitch-goal-top"></div>
                        <div class="pitch-goal-bottom"></div>
                        <div class="pitch-penalty-top"></div>
                        <div class="pitch-penalty-bottom"></div>
                    </div>
                    <!-- Chemistry lines SVG overlay -->
                    <svg id="chemistry-lines" class="chemistry-lines" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
                    <!-- Player slots will be injected by JS -->
                </div>
            </div>

        </div>



        <!-- RIGHT BENCH -->
        <div class="right-bench">
            <div class="box-label" style="text-align: center; margin-bottom: 10px;">RESERVAS</div>
            <div class="bench-slots" id="bench">
                <!-- 8 bench slots injected by JS -->
            </div>
        </div>

    </div>


    <!-- ===== PLAYER SELECTION MODAL ===== -->
    <div id="player-modal" class="player-modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <input type="text" id="modal-search" class="modal-search" placeholder="Buscar jugador...">
                <select id="modal-filter-pos" class="modal-filter-pos">
                    <option value="">Posición</option>
                </select>
                
                <!-- Custom Dropdown for Nationality to support images -->
                <div class="custom-select-wrapper" id="custom-nation-wrapper">
                    <div class="custom-select-trigger" id="custom-nation-trigger">
                        <span id="custom-nation-label">País</span>
                    </div>
                    <div class="custom-options" id="custom-nation-options">
                        <div class="custom-option" data-value="">Cualquier País</div>
                        <!-- Options injected by JS -->
                    </div>
                    <input type="hidden" id="modal-filter-nation" value="">
                </div>

                <select id="modal-filter-league" class="modal-filter-league">
                    <option value="">Liga</option>
                </select>
                <select id="modal-sort" class="modal-sort">
                    <option value="rating">Orden: Media/Pos.</option>
                    <option value="chem">Orden: Mejor Química</option>
                </select>
                <button id="modal-close" class="modal-close">✕</button>
            </div>
            <div class="modal-grid" id="modal-grid">
                <!-- Player cards injected by JS -->
            </div>
            <div class="modal-pagination" id="player-pagination">
                <button id="player-prev" class="page-btn">◀ Anterior</button>
                <span id="player-page-info">Pág 1</span>
                <button id="player-next" class="page-btn">Siguiente ▶</button>
            </div>
        </div>
    </div>

    <!-- ===== BADGE SELECTOR MODAL ===== -->
    <div id="badge-modal" class="formation-modal hidden" style="z-index: 2000;">
        <div class="formation-modal-content" style="max-width: 600px;">
            <div class="formation-modal-title">ELEGIR ESCUDO</div>
            <div id="badge-list" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; padding: 20px; max-height: 60vh; overflow-y: auto;">
                <!-- Badge items injected by JS -->
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <button class="modal-close-btn" id="badge-modal-close" style="padding: 10px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; cursor: pointer; font-family: var(--font-b);">CERRAR</button>
            </div>
        </div>
    </div>

    <!-- ===== KIT SELECTOR MODAL ===== -->
    <div id="kit-modal" class="formation-modal hidden" style="z-index: 2000;">
        <div class="formation-modal-content" style="max-width: 600px;">
            <div class="formation-modal-title">ELEGIR EQUIPACIÓN</div>
            <div id="kit-list" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; padding: 20px; max-height: 60vh; overflow-y: auto;">
                <!-- Kit items injected by JS -->
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <button class="modal-close-btn" onclick="closeKitModal()" style="padding: 10px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; cursor: pointer; font-family: var(--font-b);">CERRAR</button>
            </div>
        </div>
    </div>

    <!-- ===== FORMATION SELECTOR MODAL ===== -->
    <div id="formation-modal" class="formation-modal hidden">
        <div class="formation-modal-content">
            <div class="formation-modal-title">ELEGIR FORMACIÓN</div>
            <div class="formation-list" id="formation-list">
                <!-- Formation items injected by JS -->
            </div>
            <div class="modal-pagination" id="formation-pagination">
                <button id="form-modal-prev" class="page-btn">◀</button>
                <span id="form-modal-info">1 / 3</span>
                <button id="form-modal-next" class="page-btn">▶</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="database/tsubasa_cards.js?v=172"></script>

    <script src="database/bluelock_cards.js?v=172"></script>
    <script src="database/coaches.js?v=172"></script>
    <script src="database/kits.js?v=172"></script>
    <script src="cards.js?v=172"></script>
    <script src="squad.js?v=172"></script>
</body>
</html>
